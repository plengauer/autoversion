
name: OpenTelemetry
on:
  check_suite:
    types:
      - completed
jobs:
  export:
    if: github.event.check_suite.app.slug != 'github-actions'
    runs-on: ubuntu-latest
    permissions:
      checks: read
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/checksuite@2169fb0fa9a8260fde99a2a185bbf99a5d63546e # v5.59.0
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    container: ghcr.io/plengauer/opentelemetry-github-workflow-instrumentation-runner:v5.58.0
